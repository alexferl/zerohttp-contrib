name: golangci-lint
on:
  push:
    branches:
      - master
      - main
  pull_request:

permissions:
  # Required: allow read access to the content for analysis.
  contents: read
  # Optional: allow read access to pull request. Use with `only-new-issues` option.
  pull-requests: read
  # Optional: Allow write access to checks to allow the action to annotate code in the PR.
  checks: write

jobs:
  # Find all module directories to run lint in parallel
  find-modules:
    name: find-modules
    runs-on: ubuntu-latest
    outputs:
      modules: ${{ steps.find.outputs.modules }}
    steps:
      - name: Fetch Repository
        uses: actions/checkout@v6

      - name: Find Go modules
        id: find
        run: |
          # Find all directories containing go.mod, excluding root and examples
          MODULES=$(find . -mindepth 2 -name "go.mod" -not -path "./examples/*" -print0 | xargs -0 -n1 dirname | sed 's|^\./||' | jq -R -s -c 'split("\n")[:-1]')
          echo "modules=$MODULES" >> $GITHUB_OUTPUT
          echo "Found modules: $MODULES"

  lint:
    name: lint
    runs-on: ubuntu-latest
    needs: find-modules
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJson(needs.find-modules.outputs.modules) }}
    steps:
      - name: Fetch Repository
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.x'

      - name: Setup golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.3
          working-directory: ${{ matrix.module }}
